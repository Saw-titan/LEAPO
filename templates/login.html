{% extends "base.html" %}

{% block title %}Login - LEAP-O{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-lg border-0 rounded-4 overflow-hidden">

            <!-- Header -->
            <div class="card-header text-white text-center py-4 position-relative" 
                 style="background: linear-gradient(135deg, #1a6fd4, #2563eb); min-height: 110px;">
                
                <!-- NUVOCO Logo - TOP LEFT CORNER -->
                <img src="{{ url_for('static', filename='resources/nuvoco.jpg') }}" 
                     alt="NUVOCO" 
                     style="position: absolute; top: 12px; left: 12px;
                            height: 40px; width: 40px; object-fit: contain; 
                            background: white; border-radius: 8px; padding: 4px;
                            box-shadow: 0 2px 6px rgba(0,0,0,0.2);">

                <!-- LEAP-O Logo - TOP RIGHT CORNER -->
                <img src="{{ url_for('static', filename='resources/leapo.jpg') }}" 
                     alt="LEAP-O" 
                     style="position: absolute; top: 12px; right: 12px;
                            height: 40px; width: 40px; object-fit: contain; 
                            background: white; border-radius: 8px; padding: 4px;
                            box-shadow: 0 2px 6px rgba(0,0,0,0.2);">

                <!-- Center Title - BIGGER -->
                <div class="mt-2">
                    <h3 class="mb-0 fw-bold" style="font-size: 1.8rem; letter-spacing: 1px;">
                        LEAP-2.O
                    </h3>
                    <small class="opacity-75" style="font-size: 0.85rem;">
                        Chittor Cement Plant
                    </small>
                </div>

                <!-- Divider -->
                <hr style="border-color: rgba(255,255,255,0.3); margin: 10px 0 8px 0;">

                <!-- Sign in text - SMALLER -->
                <p class="mb-0" style="font-size: 0.75rem; opacity: 0.7;">
                    Sign in to continue
                </p>
            </div>

            <!-- Body -->
            <div class="card-body p-4" style="background: #f8f9fa;">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-semibold text-dark">Username</label>
                        <input type="text" name="username" class="form-control rounded-3 py-2" 
                               placeholder="Enter your username" required
                               style="border: 1.5px solid #dee2e6; background: white;">
                    </div>
                    <div class="mb-2">
                        <label class="form-label fw-semibold text-dark">Password</label>
                        <input type="password" name="password" class="form-control rounded-3 py-2" 
                               placeholder="Enter your password" required
                               style="border: 1.5px solid #dee2e6; background: white;">
                        <div class="text-end mt-2">
                            <a href="{{ url_for('forgot_password') }}" 
                               style="font-size: 0.82rem; color: #2563eb; text-decoration: none;">
                               Forgot password?
                            </a>
                        </div>
                    </div>
                    <button type="submit" class="btn w-100 py-2 mt-3 fw-semibold rounded-3 text-white"
                            style="background: linear-gradient(135deg, #1a6fd4, #2563eb); 
                                   font-size: 1rem; letter-spacing: 0.5px;
                                   box-shadow: 0 4px 12px rgba(37,99,235,0.4);">
                        Login
                    </button>
                </form>
            </div>

            <!-- Footer -->
            <div class="card-footer text-center py-3" style="background: #f0f0f0;">
                <small class="text-muted">Don't have an account?</small><br>
                <a href="{{ url_for('signup') }}" 
                   class="btn btn-outline-success btn-sm mt-2 px-4 rounded-3">
                   Sign Up
                </a>
            </div>

        </div>
    </div>
</div>
{% endblock %}
